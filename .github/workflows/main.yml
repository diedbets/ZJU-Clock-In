name: ClockIn

on:
  push:
    branches:
      - master
  watch:
    types: [started]
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:  # 建议添加，方便手动测试

jobs:
  ClockIn:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    steps:
      - name: Checkout
        uses: actions/checkout@master
      
      - name: Install python3
        run: |
          sudo -E apt-get -yqq update
          sudo -E apt-get -yqq install python3 python3-pip
      
      - name: Install dependencies
        run: |
          pip3 install requests  # 添加依赖安装
      
      - name: clock In
        env:
          ACCOUNT: ${{ secrets.ACCOUNT }}
          PASSWORD: ${{ secrets.PASSWORD }}  # 修正：PASSwORD → PASSWORD
        run: |
          python3 clock-in.py "$ACCOUNT" "$PASSWORD"  # 修正：使用 "$变量" 格式
